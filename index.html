<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dollar Oysters</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="hero">
            <div class="top-layout">
                <a href="https://sipsocial.org" class="side-card side-card-left">
                    <div class="logo-row">
                        <img src="sipsocial-logo.png" alt="Sip Social" class="card-logo-small">
                        <img src="oyster-icon.png" alt="Oysters" class="oyster-logo-small">
                    </div>
                    <p class="card-text">Click here to find $1 oysters near you</p>
                </a>
                
                <div class="title-section">
                    <h1>Dollar Oysters</h1>
                    <p class="subtitle">Buck a Shuck!</p>
                </div>
                
                <a href="https://sandpaw.ai" class="side-card side-card-right">
                    <img src="sandpaw-logo.png" alt="Sandpaw.ai" class="card-logo-small" style="margin: 0 auto 8px auto; display: block;">
                    <span class="click-here-text" style="margin-bottom: 8px; display: block; text-align: center;">CLICK HERE</span>
                    <p class="card-text">Your AI Chief of Staff — persistent memory, proactive intelligence, fully managed. No setup. No IT. No per-seat enterprise contract required</p>
                </a>
            </div>
        </header>

        <main class="content">
            <section class="gallery">
                <img src="oysters.png" alt="Fresh oysters">
            </section>
        </main>

        <footer>
            <p>Dollar Oysters &copy; 2026</p>
        </footer>
    </div>
</body>
</html>
